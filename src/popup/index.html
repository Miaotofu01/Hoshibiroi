<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-base: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2129;
      --fg-default: #e6edf3;
      --fg-body: #c9d1d9;
      --fg-muted: #8b949e;
      --border-default: #30363d;
      --border-muted: #21262d;
      --color-info: #58a6ff;
      --color-success: #3fb950;
      --color-warning: #d29922;
      --color-danger: #f85149;
      --radius-md: 6px;
      --radius-sm: 4px;
      --radius-lg: 8px;
      --font-sans: "Inter","Noto Sans SC","SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif;
      --font-mono: "Fira Code","SF Mono","Cascadia Code","JetBrains Mono",monospace;
      --ease-elastic: cubic-bezier(0.34,1.56,0.64,1);
      --ease-standard: cubic-bezier(0.4,0,0.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px; min-height: 320px;
      background: var(--bg-base);
      color: var(--fg-body);
      font-family: var(--font-display);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    :focus-visible { outline: 2px solid var(--color-info); outline-offset: 2px; }

    .ico { width: 1em; height: 1em; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ico svg { width: 100%; height: 100%; display: block; }

    /* ── Hero: Streak + Progress ── */
    .hero {
      padding: 18px 16px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border-default);
    }
    .streak-big {
      font-family: var(--font-mono); font-size: 42px; font-weight: 700;
      color: var(--fg-default); line-height: 1;
      display: flex; align-items: baseline; justify-content: center; gap: 6px;
    }
    .streak-fire { color: var(--color-warning); font-size: 28px; }
    .streak-label {
      font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted);
      letter-spacing: .06em; margin-top: 2px;
    }
    .today-stat {
      font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted);
      margin-top: 8px; letter-spacing: .04em;
    }
    .today-stat strong { color: var(--fg-default); }

    .hero-progress { margin-top: 10px; }
    .hero-progress .bar-track {
      height: 4px; background: var(--border-default); border-radius: 2px; overflow: hidden;
    }
    .hero-progress .bar-fill {
      height: 100%; background: var(--color-info); border-radius: 2px;
      transition: width 400ms var(--ease-elastic);
    }
    .hero-progress .bar-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);
      text-align: right; margin-top: 3px;
    }

    /* ── CTA Button ── */
    .cta-wrap { padding: 12px 16px; }
    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 0; border-radius: var(--radius-md);
      background: var(--color-info); color: #fff; border: none;
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      letter-spacing: .04em; cursor: pointer;
      transition: opacity 180ms, transform 180ms var(--ease-out);
    }
    .cta-btn:hover { opacity: .92; transform: scale(1.03); transition: transform 250ms var(--ease-elastic), opacity 180ms var(--ease-out); }
    .cta-btn:active { transform: scale(.97); }
    .cta-sub {
      text-align: center; margin-top: 6px;
      font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted);
    }
    .cta-sub strong { color: var(--color-warning); }

    /* ── Mini Favorites ── */
    .mini-section { padding: 0 16px 8px; }
    .mini-title {
      font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted);
      letter-spacing: .08em; text-transform: uppercase;
      padding-bottom: 6px; border-bottom: 1px solid var(--border-muted); margin-bottom: 6px;
    }
    .mini-word {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background 180ms;
    }
    .mini-word:hover { background: var(--bg-surface); }
    .mini-word:active { background: var(--bg-elevated); }
    .mini-word .mw {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
      color: var(--fg-default); flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mini-word .mt {
      font-size: 11px; color: var(--fg-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px;
    }
    .mini-empty {
      text-align: center; padding: 12px 0;
      font-size: 11px; color: var(--fg-muted); opacity: .6;
    }

    /* ── Footer ── */
    .foot { padding: 8px 12px; border-top: 1px solid var(--border-muted); display: flex; gap: 8px; }
    .foot a {
      flex: 1; text-align: center; padding: 6px 0; border-radius: var(--radius-sm);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em;
      color: var(--fg-muted); text-decoration: none;
      background: var(--bg-surface); border: 1px solid var(--border-default);
      transition: all 180ms; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    }
    .foot a:hover { border-color: var(--fg-muted); color: var(--fg-body); }
    .foot #open-vocab {
      border-color: var(--color-info); color: var(--color-info); background: transparent;
    }
    .foot #open-vocab:hover { background: var(--color-info); color: var(--bg-base); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }
  
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0ms!important;animation-delay:0ms!important;transition-duration:0ms!important}}
</style>
</head>
<body>
  <!-- ── Hero ── -->
  <div class="hero">
    <div class="streak-big">
      <span id="streak-num">--</span>
      <span class="streak-fire" id="streak-fire"></span>
    </div>
    <div class="streak-label">连续打卡</div>
    <div class="today-stat">
      今日已复习 <strong id="reviewed-today">--</strong> / <span id="daily-goal">--</span> 词
    </div>
    <div class="hero-progress">
      <div class="bar-track"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="bar-label" id="progress-label">--</div>
    </div>
  </div>

  <!-- ── CTA ── -->
  <div class="cta-wrap">
    <button class="cta-btn" id="btn-review">
      <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>
      开始复习
    </button>
    <div class="cta-sub" id="due-info">加载中...</div>
  </div>

  <!-- ── Recent Favorites ── -->
  <div class="mini-section">
    <div class="mini-title">最近收藏</div>
    <div id="recent-favs"><div class="mini-empty">加载中...</div></div>
  </div>

  <!-- ── Footer ── -->
  <div class="foot">
    <a href="#" id="open-vocab">
      <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      生词本
    </a>
    <a href="#" id="open-options">
      <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
      设置
    </a>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
