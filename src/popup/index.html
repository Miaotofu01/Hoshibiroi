<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-primary: #1a1b26;
      --bg-secondary: #24283b;
      --bg-hover: #2f3348;
      --text-primary: #c0caf5;
      --text-secondary: #7982a9;
      --text-muted: #565f89;
      --accent: #7aa2f7;
      --accent-green: #9ece6a;
      --accent-yellow: #e0af68;
      --accent-red: #f7768e;
      --accent-purple: #bb9af7;
      --border: #2f3550;
      --border-soft: #232842;
      --radius: 8px;
      --radius-sm: 5px;
      --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'FiraCode Nerd Font', 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px; min-height: 260px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
    }

    /* tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 12px 0; text-align: center;
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .06em;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .14s; background: none;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .count { font-size: 10px; color: var(--text-muted); margin-left: 3px; }

    /* search */
    .search-wrap { padding: 10px 12px 8px; }
    .search {
      width: 100%; padding: 7px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-secondary);
      color: var(--text-primary); font-family: var(--font-mono); font-size: 12px;
      outline: none; transition: border-color .14s;
    }
    .search::placeholder { color: var(--text-muted); }
    .search:focus { border-color: var(--accent); }

    /* list */
    .list { max-height: 340px; overflow-y: auto; padding: 0 4px 8px 12px; }
    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .entry {
      padding: 8px 10px; border-radius: var(--radius-sm);
      margin-bottom: 3px; cursor: pointer; transition: .12s;
      border: 1px solid transparent;
    }
    .entry:hover { background: var(--bg-hover); border-color: var(--border); }
    .entry:active { background: var(--bg-secondary); }
    .entry .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .entry .word {
      font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      color: var(--text-primary); word-break: break-word;
    }
    .entry .src {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--accent-green); flex-shrink: 0; margin-left: auto;
    }
    .cpy-btn {
      flex-shrink: 0; width: 24px; height: 24px; padding: 0;
      background: transparent; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1;
      transition: all .14s;
    }
    .cpy-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .entry .trans { color: var(--text-secondary); font-size: 12.5px; line-height: 1.4; word-break: break-word; }
    .entry .meta {
      display: flex; gap: 8px; margin-top: 2px;
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
    }

    .empty { text-align: center; padding: 32px 0; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }

    /* footer */
    .foot { padding: 8px 12px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; }
    .foot a {
      flex: 1; text-align: center; padding: 6px 0; border-radius: var(--radius-sm);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em;
      color: var(--text-secondary); text-decoration: none;
      background: var(--bg-secondary); border: 1px solid var(--border);
      transition: all .14s;
    }
    .foot a:hover { border-color: var(--accent); color: var(--accent); }

    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: var(--accent-green); color: #1a1b26;
      padding: 6px 16px; border-radius: 20px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 9;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-tab="history">📋 历史<span class="count" id="hist-count"></span></button>
    <button class="tab" data-tab="favorites">⭐ 收藏<span class="count" id="fav-count"></span></button>
  </div>
  <div class="search-wrap"><input class="search" id="search" placeholder="搜索…" /></div>
  <div class="list" id="list"></div>
  <div class="foot">
    <a href="#" id="open-vocab">📖 生词本</a>
    <a href="#" id="open-options">⚙ 设置</a>
  </div>
  <div class="toast" id="toast">已复制 ✓</div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
