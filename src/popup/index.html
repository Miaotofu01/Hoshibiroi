<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-primary: #1a1b26;
      --bg-secondary: #24283b;
      --text-primary: #c0caf5;
      --text-secondary: #565f89;
      --accent: #7aa2f7;
      --accent-green: #9ece6a;
      --border: #3b4261;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      padding: 12px;
    }
    h2 { font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .entry {
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--bg-secondary);
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.15s;
    }
    .entry:hover { border-color: var(--accent); }
    .entry .word { font-weight: 600; }
    .entry .trans { color: var(--accent-green); margin-left: 6px; }
    .entry .source { color: var(--text-secondary); font-size: 11px; float: right; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .actions a {
      flex: 1; text-align: center; padding: 8px;
      border-radius: var(--radius); color: var(--text-primary);
      text-decoration: none; font-size: 12px;
      background: var(--bg-secondary); border: 1px solid var(--border);
    }
    .actions a:hover { border-color: var(--accent); }
    .empty { color: var(--text-secondary); text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <h2>🔤 划词翻译</h2>
  <div id="history-list"></div>
  <div class="actions">
    <a href="#" id="open-options">⚙️ 设置</a>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
