<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>生词本 — 划词翻译</title>
<link rel="stylesheet" href="/sayo.css">
<style>
:root {
  /* Project-specific: font stacks with Chinese font separation */
  --font-display: "Inter","Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;
  --font-body: "Noto Sans SC","Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --text-micro: 11px;
  --text-sm: 12px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-display: 56px;
}
body{
  font-family:var(--font-body);font-size:16px;
  min-height:100vh;
}
.container{padding:36px 24px 80px}
.ico{width:1em;height:1em;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:100%;height:100%;display:block}
.overflow-hidden{overflow:hidden!important}

/* ── Navigation ── */
.nav{display:flex;align-items:center;gap:0;margin-bottom:28px;border-bottom:1px solid var(--syo-border)}
.nav-tab{
  padding:10px 20px;font-family:var(--syo-font-mono);font-size:var(--text-sm);
  letter-spacing:.04em;color:var(--syo-fg-muted);background:none;border:none;
  border-bottom:2px solid transparent;cursor:pointer;
  transition:color 180ms var(--syo-ease-out),border-color 180ms var(--syo-ease-out);
  display:inline-flex;align-items:center;gap:6px;
}
.nav-tab:hover{color:var(--syo-fg-body)}
.nav-tab:active{transform:scale(.95)}
.nav-tab.active{color:var(--syo-info);border-bottom-color:var(--syo-info)}
.nav-gear{width:34px;height:34px;font-size:18px}

/* ── Panel ── */
.panel{display:none}
.panel.active{display:block}

/* ═══════════════════════  LEARN PANEL  ═══════════════════════ */
.fc-card{padding:48px 40px 36px;max-width:600px;margin:0 auto;cursor:pointer}
.fc-card.revealed{border-color:var(--syo-border-muted);box-shadow:0 4px 32px rgba(0,0,0,.4)}
.fc-card-inner{transition:transform 180ms var(--syo-ease-out),opacity 180ms var(--syo-ease-out)}
.fc-word{
  font-family:var(--syo-font-mono);font-size:var(--text-display);font-weight:700;
  color:var(--syo-fg-default);text-align:center;word-break:break-word;
  line-height:1.15;letter-spacing:-.02em;margin-bottom:8px;
}
.fc-word.long{font-size:36px}
.fc-phon{font-family:var(--syo-font-mono);font-size:var(--text-base);color:var(--syo-fg-muted);text-align:center;margin-bottom:8px}
.fc-speak-btn{width:32px;height:32px;border-radius:50%;margin:0 auto 8px}
.fc-word-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.fc-key-hint{
  text-align:center;font-family:var(--syo-font-mono);font-size:var(--text-sm);
  color:var(--syo-fg-muted);opacity:.65;margin-top:20px;letter-spacing:.04em;
}
.fc-hint{
  font-family:var(--syo-font-mono);font-size:var(--text-micro);
  color:var(--syo-fg-muted);letter-spacing:.1em;text-align:center;
  opacity:.65;transition:opacity 300ms var(--syo-ease-out);margin-top:24px;
}
.fc-reveal{
  max-height:0;overflow:hidden;width:100%;
  transition:max-height 400ms var(--syo-ease-out),opacity 350ms ease,margin-top 400ms var(--syo-ease-out);
  opacity:0;margin-top:0;
}
.fc-reveal.open{max-height:500px;opacity:1;margin-top:28px}
.fc-card-inner.exit-left{transform:translateX(-30px);opacity:0}
@keyframes enter-right{
  from{transform:translateX(30px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
.fc-card-inner.enter-right{animation:enter-right 350ms var(--syo-ease-elastic) both}

.pos-tag{font-size:var(--text-micro);margin-right:6px}
.fc-meaning{font-size:var(--text-lg);color:var(--syo-fg-default);line-height:1.6;text-align:center;margin-bottom:16px}
.fc-context{
  border-left:2px solid var(--syo-warning);background:var(--syo-bg-surface);
  padding:12px 16px;border-radius:0 var(--syo-radius-sm) var(--syo-radius-sm) 0;
  font-size:var(--text-sm);font-style:italic;color:var(--syo-fg-muted);
  line-height:1.6;text-align:left;margin-bottom:12px;
}
.fc-meta{font-family:var(--syo-font-mono);font-size:var(--text-micro);color:var(--syo-fg-muted);text-align:center;margin-bottom:6px}
.fc-session-info{font-family:var(--font-display);font-size:var(--text-micro);color:var(--syo-fg-muted);text-align:center;padding-top:4px}

kbd{background:var(--syo-bg-surface);border:1px solid var(--syo-border);border-radius:3px;padding:1px 5px;font-size:10px}

/* progress */
.review-progress{display:flex;align-items:center;gap:12px;margin-bottom:48px;padding-top:8px}
.progress-track{flex:1;height:4px;background:var(--syo-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--syo-info);border-radius:2px;transition:width 350ms var(--syo-ease-elastic)}
.progress-text{font-family:var(--syo-font-mono);font-size:var(--text-sm);color:var(--syo-fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* rating */
.rating-row{margin-top:32px;transition:opacity 300ms var(--syo-ease-out)}
.rating-row.hidden{opacity:0;pointer-events:none}
.rate-btn{flex:1;max-width:180px;padding:14px 0;transition:transform 180ms var(--syo-ease-out),background 180ms var(--syo-ease-out),border-color 180ms var(--syo-ease-out)}
.rate-btn:hover{transform:scale(1.06)}
.rate-btn:active{transform:scale(.96)}
.rate-btn.unknown{color:var(--syo-fg-body);border-left:3px solid rgba(248,81,73,.5)}
.rate-btn.unknown:hover{
  border-color:var(--syo-danger);color:var(--syo-danger);
  background:rgba(248,81,73,.06);border-left-color:var(--syo-danger);
}
.rate-btn.unknown:active{background:rgba(248,81,73,.15)}
.rate-btn.fuzzy{color:var(--syo-fg-body);border-left:3px solid rgba(210,153,34,.5)}
.rate-btn.fuzzy:hover{
  border-color:var(--syo-warning);color:var(--syo-warning);
  background:rgba(210,153,34,.06);border-left-color:var(--syo-warning);
}
.rate-btn.fuzzy:active{background:rgba(210,153,34,.15)}
.rate-btn.known{color:var(--syo-fg-body);border-left:3px solid rgba(63,185,80,.5)}
.rate-btn.known:hover{
  border-color:var(--syo-success);color:var(--syo-success);
  background:rgba(63,185,80,.06);border-left-color:var(--syo-success);
}
.rate-btn.known:active{background:rgba(63,185,80,.15)}

/* review done */
.review-done{display:none;text-align:center;padding:60px 20px}
.review-done.active{display:block}
.done-icon{font-size:56px;margin-bottom:16px;color:var(--syo-success)}
.done-title{font-family:var(--font-display);font-size:var(--text-xl);color:var(--syo-fg-default);margin-bottom:8px}
.done-desc{font-size:var(--text-base);color:var(--syo-fg-muted);line-height:1.6;margin-bottom:24px}
.back-btn{padding:10px 24px;gap:6px;border-color:var(--syo-info);color:var(--syo-info);transition:background 180ms var(--syo-ease-out),color 180ms var(--syo-ease-out),border-color 180ms var(--syo-ease-out),transform 180ms var(--syo-ease-out)}
.back-btn:hover{background:var(--syo-info);color:var(--syo-bg-base)}

/* ═══════════════════════  BROWSE PANEL  ═══════════════════════ */
.browse-toolbar{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.search-wrap{position:relative}
.search-wrap .ico{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--syo-fg-muted);pointer-events:none;z-index:1;
}
.search-input{padding-left:36px}

.sort-select{padding:10px 32px 10px 12px}

.filter-pill{padding:5px 14px;font-size:var(--text-sm);cursor:pointer;transition:background 180ms var(--syo-ease-out),border-color 180ms var(--syo-ease-out),color 180ms var(--syo-ease-out)}
.filter-pill:hover{transform:none}
.filter-pill.active{background:var(--syo-info);color:#fff;border-color:var(--syo-info)}

.word-card{margin-bottom:10px;overflow:hidden;padding:0}
.card-body{padding:16px 20px}
.card-head .word{font-family:var(--syo-font-mono);font-size:var(--text-lg);font-weight:600;word-break:break-word}
.card-head .phon{font-family:var(--syo-font-mono);font-size:var(--text-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-actions{margin-left:auto;display:flex;gap:4px;flex-shrink:0}
.act-btn{width:28px;height:28px;font-size:14px;transition:transform 180ms var(--syo-ease-out),background 180ms var(--syo-ease-out),border-color 180ms var(--syo-ease-out),color 180ms var(--syo-ease-out)}
.act-btn.copy-btn.copied{border-color:var(--syo-success);color:var(--syo-success)}
.act-btn.delete-btn:hover{border-color:var(--syo-danger);color:var(--syo-danger);transform:scale(1.1)}

.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.syo-tag-dot--success{background:var(--syo-success)}
.syo-tag-dot--warning{background:var(--syo-warning)}
.status-dot.new{background:var(--syo-fg-muted)}

.card-body .meanings{margin-bottom:8px;line-height:1.5}
.pos-tag{font-size:var(--text-micro);margin-right:6px}
.card-context{
  border-left:2px solid var(--syo-warning);
  padding:8px 12px;border-radius:0 var(--syo-radius-sm) var(--syo-radius-sm) 0;
  font-size:var(--text-sm);font-style:italic;color:var(--syo-fg-muted);
  line-height:1.5;margin-bottom:8px;cursor:pointer;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:background 180ms var(--syo-ease-out),-webkit-line-clamp .2s;
}
.card-context:hover{background:var(--syo-bg-elevated)}
.card-context.expanded{-webkit-line-clamp:unset}
.card-meta{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
  padding-top:8px;border-top:1px solid var(--syo-border-muted);
}
.card-meta .src-link{color:var(--syo-info);text-decoration:none;display:inline-flex;align-items:center;gap:3px;transition:color 180ms}
.card-meta .src-link:hover{color:var(--syo-secondary)}
.card-mastery{font-family:var(--syo-font-mono);font-size:var(--text-micro);color:var(--syo-success);margin-left:8px}
.ctx-chevron{display:inline-block;margin-left:4px;transition:transform 200ms var(--syo-ease-out);vertical-align:middle;color:var(--syo-fg-muted)}
.card-context.expanded .ctx-chevron{transform:rotate(180deg)}
.curve-toggle{
  transition:transform .2s var(--syo-ease-out);
}
.curve-toggle.expanded{transform:rotate(90deg)}
.card-curve{
  margin-top:12px;padding-top:12px;border-top:1px solid var(--syo-border-muted);
  overflow:hidden;
}
.src-dot{width:6px;height:6px;display:inline-block;border-radius:50%;flex-shrink:0}
.src-dot.s-deepseek{background:var(--syo-accent)}
.src-dot.s-google{background:var(--syo-success)}
.src-dot.s-tencent{background:var(--syo-info)}
.src-dot.s-baidu{background:var(--syo-danger)}
.src-dot.s-deepl{background:var(--syo-secondary)}

.browse-empty{
  display:none;text-align:center;padding:80px 20px;color:var(--syo-fg-muted);
}
.browse-empty.visible{display:block}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty-icon .ico{width:48px;height:48px}
.empty-title{font-family:var(--font-display);font-size:var(--text-base);color:var(--syo-fg-muted);margin-bottom:6px}
.empty-desc{font-size:var(--text-sm);line-height:1.6}

/* ═══════════════════════  STATS PANEL  ═══════════════════════ */
.section-title{font-size:var(--text-lg);font-weight:600;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid var(--syo-border)}
.stat-big{flex:1;min-width:140px}
.today-progress{margin-bottom:28px}
.today-progress .progress-track{height:4px}
.today-progress .progress-fill{background:var(--syo-info)}
.today-progress .progress-text{margin-top:6px;display:block}

.calendar-wrap{overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.calendar-months{
  display:grid;grid-auto-columns:1fr;grid-auto-flow:column;
  font-family:var(--syo-font-mono);font-size:var(--text-micro);color:var(--syo-fg-muted);
  margin-bottom:4px;margin-left:24px;
}
.calendar-months span{font-size:var(--text-micro)}
.calendar-grid{
  display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;
  gap:3px;margin-bottom:8px;
}
.calendar-row-labels{
  display:grid;grid-template-rows:repeat(7,1fr);gap:3px;
  float:left;margin-right:4px;width:20px;
  font-family:var(--syo-font-mono);font-size:9px;color:var(--syo-fg-muted);
}
.calendar-row-labels span{display:flex;align-items:center;height:16px}
.calendar-cell{width:16px;height:16px;border-radius:3px;background:var(--syo-border-muted)}
.calendar-cell.empty{background:transparent}
.calendar-cell.level-1{background:#3fb95044}
.calendar-cell.level-2{background:#3fb95088}
.calendar-cell.level-3{background:var(--syo-success)}
.calendar-legend{
  display:flex;align-items:center;gap:6px;justify-content:flex-end;
  font-family:var(--syo-font-mono);font-size:var(--text-micro);color:var(--syo-fg-muted);margin-bottom:16px;
}
.calendar-legend .calendar-cell{display:inline-block}

.forecast-list{margin-bottom:24px}
.forecast-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:var(--text-sm)}
.forecast-row .date-label{font-family:var(--syo-font-mono);color:var(--syo-fg-muted);width:80px;flex-shrink:0}
.forecast-row .count-label{font-family:var(--syo-font-mono);color:var(--syo-fg-muted);width:36px;text-align:right;flex-shrink:0}
.forecast-bar-track{flex:1;height:8px;background:var(--syo-border-muted);border-radius:4px;overflow:hidden}
.forecast-bar-fill{height:100%;background:var(--syo-info);border-radius:4px;transition:width 350ms var(--syo-ease-elastic)}
.forecast-row.heavy .forecast-bar-fill{background:var(--syo-danger)}
.forecast-row.heavy .count-label{color:var(--syo-danger)}

.curve-word-select{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.curve-word-chip{
  white-space:nowrap;padding:4px 12px;border-radius:20px;
  border:1px solid var(--syo-border);background:transparent;
  font-family:var(--syo-font-mono);font-size:var(--text-micro);color:var(--syo-fg-muted);
  cursor:pointer;transition:all 180ms var(--syo-ease-out);
}
.curve-word-chip:hover{border-color:var(--syo-fg-muted)}.curve-word-chip:active{transform:scale(.95)}
.curve-word-chip.active{background:var(--syo-info);color:#fff;border-color:var(--syo-info)}
.curve-svg-wrap{width:100%;overflow-x:auto;margin-bottom:12px}

/* ═══════════════════════  SETTINGS DRAWER  ═══════════════════════ */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity 300ms var(--syo-ease-out);
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;width:380px;height:100%;z-index:101;
  background:var(--syo-bg-surface);border-left:1px solid var(--syo-border);
  transform:translateX(100%);transition:transform 350ms var(--syo-ease-elastic);
  display:flex;flex-direction:column;overflow:hidden;
}
.drawer.open{transform:translateX(0)}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--syo-border);
}
.drawer-header h2{font-family:var(--font-display);font-size:var(--text-lg);color:var(--syo-fg-default);letter-spacing:.04em}
.drawer-close-btn{
  width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1px solid transparent;border-radius:var(--syo-radius-md);
  color:var(--syo-fg-muted);cursor:pointer;font-size:18px;transition:all 180ms var(--syo-ease-out);
}
.drawer-close-btn:hover{color:var(--syo-fg-default);border-color:var(--syo-border)}.drawer-close-btn:active{transform:scale(.92)}
.drawer-body{flex:1;overflow-y:auto;padding:24px}
.setting-section{margin-bottom:24px}
.setting-section-title{
  font-family:var(--syo-font-mono);font-size:var(--text-sm);font-weight:600;
  color:var(--syo-fg-muted);letter-spacing:.04em;margin-bottom:12px;padding-bottom:4px;
  border-bottom:1px solid var(--syo-border-muted);
}
.setting-group{margin-bottom:14px}
.setting-label{display:block;font-size:var(--text-sm);margin-bottom:6px}
.setting-actions{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.setting-btn.danger{color:var(--syo-danger);border-color:var(--syo-danger)}
.drawer-footer{
  padding:16px 24px;border-top:1px solid var(--syo-border);
}
.save-btn{width:100%;padding:12px;font-family:var(--font-mono);font-size:var(--text-sm)}
.skeleton{background:var(--syo-bg-surface);border-radius:var(--syo-radius-sm);animation:syo-shimmer 1.8s ease-in-out infinite;background-size:200% 100%}
</style>
<script src="/sayo.js"></script>
</head>
<body>
<div id="app" class="container">
  <nav class="nav syo-flex" role="tablist" aria-label="生词本导航">
    <button class="nav-tab active" data-panel="learn" role="tab" aria-selected="true">学习</button>
    <button class="nav-tab" data-panel="browse" role="tab" aria-selected="false">词库</button>
    <button class="nav-tab" data-panel="stats" role="tab" aria-selected="false">统计</button>
    <button class="nav-gear syo-btn syo-btn--ghost" id="btn-settings" style="margin-left:auto" title="设置">
      <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    </button>
  </nav>

  <!-- ═══ LEARN PANEL ═══ -->
  <div class="panel active" id="panel-learn">
    <div class="review-progress" id="review-progress">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0"></div></div>
      <span class="progress-text" id="progress-text">0/0</span>
    </div>
    <div id="fc-area">
      <div class="syo-card fc-card" id="fc-card">
      <div class="fc-card-inner" id="fc-inner">
        <div class="fc-word" id="fc-word"></div>
        <div class="fc-phon" id="fc-phon"></div>
        <button class="syo-btn fc-speak-btn" id="btn-speak" title="发音">
          <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
        </button>
        <div class="fc-hint" id="fc-hint">点击卡片或按空格键显示释义</div>
        <div class="fc-key-hint" id="fc-key-hint">Space/Enter 翻面 · 1 不认识 · 2 模糊 · 3 认识</div>
        <div class="fc-reveal" id="fc-reveal">
          <div class="syo-flex syo-gap-2 fc-pos" style="justify-content:center;flex-wrap:wrap" id="fc-pos"></div>
          <div class="fc-meaning" id="fc-meaning"></div>
          <div class="fc-context" id="fc-context"></div>
          <div class="fc-meta" id="fc-meta"></div>
          <div class="fc-session-info" id="fc-session-info"></div>
        </div>
      </div>
      </div>
      <div class="syo-flex rating-row hidden" style="gap:12px;justify-content:center" id="rating-row">
        <button class="syo-btn rate-btn unknown" id="btn-unknown">不认识</button>
        <button class="syo-btn rate-btn fuzzy" id="btn-fuzzy">模糊</button>
        <button class="syo-btn rate-btn known" id="btn-known">认识</button>
      </div>
    </div>
    <div class="review-done" id="review-done">
      <div class="done-icon">
        <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:56px;height:56px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
      </div>
      <div class="done-title" id="done-title">今日复习完成</div>
      <div class="done-desc" id="done-desc"></div>
      <button class="syo-btn back-btn" id="back-to-browse">
        <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></span>
        返回词库
      </button>
    </div>
  </div>

  <!-- ═══ BROWSE PANEL ═══ -->
  <div class="panel" id="panel-browse">
    <div class="browse-toolbar" id="browse-toolbar">
      <div class="toolbar-row" style="display:flex;gap:10px;align-items:center">
        <div class="search-wrap" style="flex:1">
          <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input class="syo-input search-input" id="search-input" placeholder="搜索单词或释义">
        </div>
        <select class="syo-select sort-select" id="sort-select">
          <option value="newest">最新添加</option>
          <option value="oldest">最早添加</option>
          <option value="alpha-asc">A → Z</option>
          <option value="alpha-desc">Z → A</option>
          <option value="last-reviewed">最近复习</option>
          <option value="mastery">掌握度</option>
        </select>
      </div>
      <div class="syo-flex filter-pills" style="gap:8px;flex-wrap:wrap" id="filter-pills">
        <button class="syo-tag filter-pill active" data-filter="all">全部 <span id="count-all">0</span></button>
        <button class="syo-tag filter-pill" data-filter="new">新词 <span id="count-new">0</span></button>
        <button class="syo-tag filter-pill" data-filter="learning">学习中 <span id="count-learning">0</span></button>
        <button class="syo-tag filter-pill" data-filter="mastered">已掌握 <span id="count-mastered">0</span></button>
      </div>
    </div>
    <div id="word-list"></div>
    <div class="browse-empty" id="browse-empty">
      <div class="empty-icon">
        <span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      </div>
      <div class="empty-title">还没有收藏词汇</div>
      <div class="empty-desc">在任意网页选中文字翻译后，点击收藏即可加入生词本。</div>
    </div>
  </div>

  <!-- ═══ STATS PANEL ═══ -->
  <div class="panel" id="panel-stats">
    <div id="stats-overview">
      <div class="syo-flex stat-row" style="flex-wrap:wrap;gap:24px">
        <div class="syo-stat stat-big"><div class="syo-stat-value" id="stat-total"><div class="skeleton" style="height:28px;width:48px;margin:0 auto"></div></div><div class="syo-stat-label">总词汇</div></div>
        <div class="syo-stat stat-big"><div class="syo-stat-value" id="stat-learning"><div class="skeleton" style="height:28px;width:48px;margin:0 auto"></div></div><div class="syo-stat-label">学习中</div></div>
        <div class="syo-stat stat-big"><div class="syo-stat-value" id="stat-mastered"><div class="skeleton" style="height:28px;width:48px;margin:0 auto"></div></div><div class="syo-stat-label">已掌握</div></div>
        <div class="syo-stat stat-big"><div class="syo-stat-value" id="stat-streak"><div class="skeleton" style="height:28px;width:48px;margin:0 auto"></div></div><div class="syo-stat-label">连续天数</div></div>
      </div>
      <div class="today-progress">
        <div class="progress-track"><div class="progress-fill" id="today-fill" style="width:0%"></div></div>
        <span class="progress-text" id="today-text">今日 0/0 目标</span>
      </div>
    </div>
    <div id="stats-calendar">
      <div class="syo-section-label section-title">学习日历</div>
      <div class="calendar-wrap">
        <div class="calendar-months" id="calendar-months" style="visibility:hidden;height:14px"></div>
        <div style="display:flex">
          <div class="calendar-row-labels">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </div>
      <div class="calendar-legend">
        <span>少</span>
        <span class="calendar-cell"></span>
        <span class="calendar-cell level-1"></span>
        <span class="calendar-cell level-2"></span>
        <span class="calendar-cell level-3"></span>
        <span>多</span>
      </div>
    </div>
    <div id="stats-forecast">
      <div class="syo-section-label section-title">未来 7 天复习预测</div>
      <div class="forecast-list" id="forecast-list"></div>
    </div>
    <div id="stats-curve">
      <div class="syo-section-label section-title">记忆曲线</div>
      <div class="curve-word-select" id="curve-word-select"></div>
      <div class="curve-svg-wrap" id="curve-svg-wrap"></div>
    </div>
  </div>
</div>

<!-- ═══ SETTINGS DRAWER ═══ -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>设置</h2>
    <button class="drawer-close-btn" id="drawer-close-btn"><span class="ico"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
  </div>
  <div class="drawer-body">
    <div class="setting-section">
      <div class="setting-section-title">卡片模板</div>
      <div class="setting-group">
        <div class="setting-label">正面显示</div>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 单词</label>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 音标</label>
        <label class="syo-checkbox setting-check"><input type="checkbox"><span class="syo-checkmark"></span> 上下文</label>
      </div>
      <div class="setting-group">
        <div class="setting-label">背面显示</div>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 释义</label>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 词性</label>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 例句</label>
        <label class="syo-checkbox setting-check"><input type="checkbox" checked><span class="syo-checkmark"></span> 上下文</label>
        <label class="syo-checkbox setting-check"><input type="checkbox"><span class="syo-checkmark"></span> 来源</label>
      </div>
      <div class="setting-group">
        <div class="setting-label">布局风格</div>
        <label class="syo-radio setting-radio"><input type="radio" name="layout" checked><span class="syo-radiomark"></span> 不背单词（单词为主）</label>
        <label class="syo-radio setting-radio"><input type="radio" name="layout"><span class="syo-radiomark"></span> 上下文优先（句子挖空）</label>
      </div>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">学习参数</div>
      <div class="setting-group">
        <div class="setting-label">每日新词上限</div>
        <select class="syo-select setting-select" id="setting-new-limit">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="25">25</option>
        </select>
      </div>
      <div class="setting-group">
        <div class="setting-label">每日复习上限</div>
        <select class="syo-select setting-select" id="setting-review-limit">
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="0">无限制</option>
        </select>
      </div>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">通知</div>
      <label class="syo-checkbox setting-check"><input type="checkbox" id="setting-reminder" checked><span class="syo-checkmark"></span> 复习提醒</label>
      <label class="syo-checkbox setting-check"><input type="checkbox" id="setting-celebration"><span class="syo-checkmark"></span> 达标庆祝</label>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">数据</div>
      <div class="setting-actions">
        <button class="syo-btn setting-btn" id="btn-export-csv">导出 CSV</button>
        <button class="syo-btn setting-btn" id="btn-export-json">导出 JSON</button>
        <button class="syo-btn setting-btn danger" id="btn-clear-all">清除全部数据</button>
      </div>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="syo-btn syo-btn--primary save-btn" id="save-settings">保存设置</button>
  </div>
</div>

<script type="module" src="./index.ts"></script>
</body>
</html>
