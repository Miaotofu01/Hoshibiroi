<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 — 划词翻译</title>
  <link rel="stylesheet" href="/sayo.css">
  <style>
    :root {
      --font-display: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: "Noto Sans SC", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font-body);
      font-size: 14px;
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      color: var(--syo-fg-default);
      margin-bottom: 24px;
    }

    h2 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--syo-fg-default);
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--syo-border);
    }

    .hint {
      font-size: 12px;
      color: var(--syo-fg-muted);
      margin-bottom: 12px;
    }

    /* ── Translator cards ─────────────────────────────────────── */
    .translator-card {
      background: var(--syo-bg-surface);
      border: 1px solid var(--syo-border);
      border-radius: var(--syo-radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .arrow-buttons {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .arrow-btn {
      background: none;
      border: 1px solid var(--syo-border);
      border-radius: 4px;
      color: var(--syo-info);
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 2px 4px;
      transition: background 150ms var(--syo-ease-out), color 150ms var(--syo-ease-out);
    }

    .arrow-btn:hover:not(:disabled) {
      background: var(--syo-info);
      color: var(--syo-bg-base);
    }

    .arrow-btn:disabled {
      opacity: .35;
      cursor: default;
    }

    .translator-info {
      flex: 1;
    }

    .translator-name {
      font-weight: 600;
      color: var(--syo-fg-default);
    }

    .translator-desc {
      font-size: 12px;
      color: var(--syo-fg-muted);
      margin-top: 2px;
    }

    .api-key-input {
      width: 200px;
      padding: 6px 10px;
      border-radius: var(--syo-radius-sm);
      border: 1px solid var(--syo-border);
      background: var(--syo-bg-base);
      color: var(--syo-fg-body);
      font-size: 13px;
      font-family: var(--syo-font-mono);
      margin-left: 8px;
    }

    .api-key-input:focus {
      outline: none;
      border-color: var(--syo-info);
    }

    /* ── Toggle switch ────────────────────────────────────────── */
    .toggle {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--syo-fg-muted);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background .2s var(--syo-ease-out);
      flex-shrink: 0;
    }

    .toggle.enabled {
      background: var(--syo-success);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: left .2s var(--syo-ease-out);
    }

    .toggle.enabled::after {
      left: 22px;
    }

    /* ── Form elements ────────────────────────────────────────── */
    .lang-select {
      padding: 8px 12px;
      border-radius: var(--syo-radius-md);
      border: 1px solid var(--syo-border);
      background: var(--syo-bg-surface);
      color: var(--syo-fg-body);
      font-size: 14px;
      font-family: var(--font-body);
    }

    .pref-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 400px;
    }

    .pref-slider-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--syo-fg-muted);
    }

    .pref-slider-label .label-icon {
      font-family: var(--syo-font-mono);
    }

    .pref-slider {
      flex: 1;
      max-width: 200px;
      accent-color: var(--syo-info);
    }

    .pref-val {
      font-family: var(--syo-font-mono);
      color: var(--syo-info);
      min-width: 36px;
    }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--syo-success);
      color: var(--syo-bg-base);
      padding: 10px 20px;
      border-radius: var(--syo-radius-md);
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s var(--syo-ease-out);
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── Shortcuts hint ──────────────────────────────────────── */
    .shortcuts-hint {
      color: var(--syo-fg-muted);
      font-size: 12px;
    }

    .shortcuts-hint a {
      color: var(--syo-info);
    }
  </style>
</head>
<body>
  <h1>翻译设置</h1>

  <h2>翻译源</h2>
  <p class="hint">点击 ▲ ▼ 按钮调整翻译源优先级，靠前的优先使用</p>
  <div id="translators-list"></div>

  <h2>语言偏好</h2>
  <div style="display:flex;gap:16px;align-items:center">
    <label>
      目标语言：
      <select class="lang-select" id="target-lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
    </label>
    <label>
      源语言默认：
      <select class="lang-select" id="source-lang">
        <option value="auto">自动检测</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
    </label>
  </div>

  <h2>外观默认值</h2>
  <div class="pref-row">
    <div>
      <label class="pref-slider-label">
        <span class="label-icon">Aa</span> 字体大小
        <input type="range" id="font-scale" class="pref-slider" min="12" max="32" />
        <span id="font-val" class="pref-val">20px</span>
      </label>
    </div>
    <div>
      <label class="pref-slider-label">
        <span>◐</span> 卡片透明度
        <input type="range" id="opacity" class="pref-slider" min="40" max="100" />
        <span id="opacity-val" class="pref-val">95%</span>
      </label>
    </div>
  </div>

  <h2>快捷键</h2>
  <p class="shortcuts-hint">
    在 <a href="chrome://extensions/shortcuts">chrome://extensions/shortcuts</a> 中自定义
  </p>

  <button class="syo-btn syo-btn--primary" id="save" style="margin-top:24px;padding:10px 28px;font-weight:600">保存设置</button>
  <div class="toast" id="toast">已保存 ✓</div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
